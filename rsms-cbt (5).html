<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#0d1117"/>
<title>RSMS &#8212; CBT Exam</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');
/* ═══════════════════════════════════════════════════
   RSMS CORE CSS — Include in every portal
   Single source of truth for all shared styles
═══════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');

:root {
  /* Brand */
  --navy:   #0f1535;
  --navy2:  #1a2347;
  --navy3:  #232d5a;
  --gold:   #d4a843;
  --goldl:  rgba(212,168,67,.12);
  --goldb:  rgba(212,168,67,.06);
  --teal:   #0ea5e9;
  --teall:  rgba(14,165,233,.1);
  --green:  #22c55e;
  --greenl: rgba(34,197,94,.1);
  --red:    #f43f5e;
  --redl:   rgba(244,63,94,.1);
  --orange: #f97316;
  --orangel:rgba(249,115,22,.1);
  --purple: #8b5cf6;
  --purplel:rgba(139,92,246,.1);

  /* Light page bg */
  --bg:    #eef2ff;
  --bg2:   #f8faff;
  --card:  #ffffff;
  --card2: #f1f5ff;

  /* Text */
  --t1: #111827;
  --t2: #374151;
  --t3: #6b7280;
  --t4: #9ca3af;

  /* Borders */
  --line:  #e5e7eb;
  --line2: #d1d5db;

  /* Fonts */
  --sans:  'Outfit', sans-serif;
  --serif: 'Fraunces', serif;
  --mono:  'DM Mono', monospace;

  /* Layout */
  --sb-w:  230px;
  --r:     14px;
  --r2:    10px;
  --r3:    7px;

  /* Safe areas */
  --safe-top: env(safe-area-inset-top);
  --safe-bot: env(safe-area-inset-bottom);
}

/* ── RESET ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; font-family:var(--sans); background:var(--bg); color:var(--t1); }

/* ── LAYOUT ── */
.app-shell { display:flex; height:100vh; overflow:hidden; }

/* Sidebar */
.sidebar {
  width:var(--sb-w); flex-shrink:0;
  background:var(--navy);
  display:flex; flex-direction:column;
  height:100vh; overflow-y:auto; overflow-x:hidden;
  transition:transform .28s ease;
  z-index:200;
}
.sidebar::-webkit-scrollbar { display:none; }

/* Main */
.main-area {
  flex:1; display:flex; flex-direction:column;
  overflow:hidden; min-width:0;
}
.main-scroll {
  flex:1; overflow-y:auto;
  padding-bottom:calc(70px + var(--safe-bot));
}
.main-scroll::-webkit-scrollbar { width:4px; }
.main-scroll::-webkit-scrollbar-thumb { background:var(--line2); border-radius:2px; }

/* ── MOBILE ── */
@media (max-width:899px) {
  .sidebar {
    position:fixed; left:0; top:0;
    transform:translateX(-100%);
    box-shadow:4px 0 32px rgba(0,0,0,.3);
  }
  .sidebar.open { transform:translateX(0); }
  .sb-overlay {
    position:fixed; inset:0;
    background:rgba(0,0,0,.55);
    z-index:190;
    display:none;
  }
  .sb-overlay.show { display:block; }
}
@media (min-width:900px) {
  .menu-btn { display:none !important; }
  .sb-overlay { display:none !important; }
  .bottom-nav { display:none !important; }
}

/* ── SIDEBAR INTERNALS ── */
.sb-brand {
  padding:calc(16px + var(--safe-top)) 16px 14px;
  display:flex; align-items:center; gap:10px;
  border-bottom:1px solid rgba(255,255,255,.07);
}
.sb-logo { width:36px; height:36px; border-radius:10px; object-fit:contain; flex-shrink:0; background:rgba(255,255,255,.1); }
.sb-school { font-family:var(--serif); font-size:.9rem; font-weight:700; color:#fff; line-height:1.2; }
.sb-tagline { font-size:.65rem; color:rgba(255,255,255,.4); }

.sb-user {
  margin:10px 12px; padding:10px 12px;
  background:rgba(255,255,255,.06); border-radius:var(--r2);
  display:flex; align-items:center; gap:9px;
}
.sb-av {
  width:36px; height:36px; border-radius:50%;
  background:var(--gold); color:#000; font-weight:800; font-size:.9rem;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.sb-uname { font-size:.82rem; font-weight:700; color:#fff; }
.sb-urole { font-size:.63rem; color:rgba(255,255,255,.4); }

.sb-section {
  padding:10px 16px 4px;
  font-size:.58rem; font-weight:800; color:rgba(255,255,255,.3);
  text-transform:uppercase; letter-spacing:.12em;
}

.sb-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 16px; cursor:pointer;
  font-size:.82rem; font-weight:600; color:rgba(255,255,255,.6);
  transition:all .18s; border-left:3px solid transparent;
  user-select:none;
}
.sb-item:hover { background:rgba(255,255,255,.06); color:#fff; }
.sb-item.active { background:rgba(212,168,67,.1); color:var(--gold); border-left-color:var(--gold); }
.sb-item .ico { font-size:1.1rem; width:22px; text-align:center; flex-shrink:0; }
.sb-badge {
  margin-left:auto; background:var(--red); color:#fff;
  border-radius:20px; padding:1px 7px; font-size:.6rem; font-weight:800;
}

.sb-footer {
  margin-top:auto; padding:12px 16px;
  border-top:1px solid rgba(255,255,255,.06);
  font-size:.72rem; color:rgba(255,255,255,.25);
}

/* ── TOPBAR ── */
.topbar {
  background:var(--navy);
  padding:calc(12px + var(--safe-top)) 16px 12px;
  display:flex; align-items:center; gap:12px;
  flex-shrink:0; position:relative; z-index:10;
}
.menu-btn {
  background:none; border:none; color:rgba(255,255,255,.7);
  font-size:1.3rem; cursor:pointer; padding:4px; line-height:1;
}
.topbar-title { font-family:var(--serif); font-size:1rem; font-weight:700; color:#fff; flex:1; }
.topbar-right { display:flex; align-items:center; gap:8px; }
.tb-notif {
  background:rgba(255,255,255,.1); border:none; border-radius:50%;
  width:36px; height:36px; color:#fff; cursor:pointer; font-size:1rem;
  display:flex; align-items:center; justify-content:center;
}
.tb-av {
  width:36px; height:36px; border-radius:50%;
  background:var(--gold); color:#000; font-weight:800; font-size:.85rem;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
}

/* ── STAT HERO CARD ── */
.hero-card {
  background:linear-gradient(135deg, var(--navy), var(--navy2));
  margin:0 16px 16px; border-radius:var(--r);
  padding:16px; position:relative; overflow:hidden;
}
.hero-card::before {
  content:''; position:absolute; inset:0; opacity:.04;
  background-image:radial-gradient(circle,#fff 1px,transparent 1px);
  background-size:18px 18px;
}
.hc-label { font-size:.7rem; color:rgba(255,255,255,.5); font-weight:600; margin-bottom:4px; }
.hc-val { font-family:var(--serif); font-size:1.8rem; font-weight:900; color:#fff; margin-bottom:2px; }
.hc-sub { font-size:.72rem; color:rgba(255,255,255,.5); }
.hc-row { display:flex; align-items:center; justify-content:space-between; }
.hc-badge {
  background:rgba(255,255,255,.12); border-radius:20px;
  padding:4px 12px; font-size:.72rem; color:rgba(255,255,255,.7); font-weight:600;
}

/* ── BANNER CAROUSEL ── */
.carousel-wrap { padding:0 16px 4px; }
.carousel-track {
  display:flex; gap:12px;
  overflow-x:auto; scroll-snap-type:x mandatory;
  scroll-behavior:smooth; scrollbar-width:none;
  padding-bottom:4px;
}
.carousel-track::-webkit-scrollbar { display:none; }
.banner {
  min-width:calc(100% - 32px); height:120px;
  border-radius:var(--r); flex-shrink:0;
  scroll-snap-align:start; position:relative;
  overflow:hidden; cursor:pointer;
}
@media (min-width:600px) { .banner { min-width:280px; } }
.banner-bg { position:absolute; inset:0; }
.banner-content {
  position:relative; z-index:1; padding:14px 16px;
  height:100%; display:flex; flex-direction:column; justify-content:space-between;
}
.banner-tag {
  background:rgba(255,255,255,.2); border-radius:20px;
  padding:2px 9px; font-size:.6rem; font-weight:800;
  color:#fff; display:inline-block; width:fit-content;
}
.banner-title { font-size:.95rem; font-weight:800; color:#fff; line-height:1.3; }
.banner-sub { font-size:.7rem; color:rgba(255,255,255,.75); }
.banner-btn {
  background:rgba(255,255,255,.18); border:none; border-radius:20px;
  color:#fff; font-size:.7rem; font-weight:700; padding:5px 12px;
  cursor:pointer; font-family:var(--sans);
}
.carousel-dots { display:flex; justify-content:center; gap:5px; padding:6px 0 12px; }
.dot { width:6px; height:6px; border-radius:50%; background:var(--line2); transition:all .3s; }
.dot.active { width:18px; border-radius:3px; background:var(--navy); }

/* ── QUICK ACTIONS ── */
.qa-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.qa-item {
  background:var(--card); border-radius:12px;
  padding:14px 6px; text-align:center;
  cursor:pointer; transition:all .18s;
  box-shadow:0 1px 4px rgba(0,0,0,.06); border:1px solid var(--line);
}
.qa-item:active { transform:scale(.93); background:var(--card2); }
.qa-ico { font-size:1.5rem; display:block; margin-bottom:5px; }
.qa-lbl { font-size:.62rem; font-weight:700; color:var(--t2); line-height:1.3; }

/* ── SECTION ── */
.section { padding:0 16px 16px; }
.sec-hd {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:10px;
}
.sec-title { font-size:.75rem; font-weight:800; color:var(--t3); text-transform:uppercase; letter-spacing:.09em; }
.sec-action { font-size:.75rem; font-weight:700; color:var(--teal); cursor:pointer; }

/* ── CARDS ── */
.card {
  background:var(--card); border-radius:var(--r);
  border:1px solid var(--line);
  padding:16px; margin-bottom:12px;
  box-shadow:0 1px 4px rgba(0,0,0,.05);
}
.card-title {
  font-size:.88rem; font-weight:700; color:var(--t1);
  display:flex; align-items:center; gap:8px; margin-bottom:14px;
}
.card-body { font-size:.85rem; color:var(--t2); line-height:1.6; }

/* ── STAT TILES ── */
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.stat-tile {
  background:var(--card); border-radius:var(--r2);
  padding:14px; border:1px solid var(--line);
  border-top:3px solid var(--line2);
  box-shadow:0 1px 4px rgba(0,0,0,.05);
}
.stat-tile.s-blue  { border-top-color:var(--teal); }
.stat-tile.s-gold  { border-top-color:var(--gold); }
.stat-tile.s-green { border-top-color:var(--green); }
.stat-tile.s-red   { border-top-color:var(--red); }
.stat-v { font-family:var(--serif); font-size:1.6rem; font-weight:900; color:var(--t1); }
.stat-l { font-size:.7rem; color:var(--t3); font-weight:600; margin-top:2px; }

/* ── ACTIVITY LIST ── */
.act-item {
  display:flex; align-items:center; gap:12px;
  padding:12px 0; border-bottom:1px solid var(--line);
  cursor:pointer;
}
.act-item:last-child { border-bottom:none; }
.act-ico {
  width:40px; height:40px; border-radius:12px;
  display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0;
}
.act-ico.c-blue   { background:#eff6ff; }
.act-ico.c-gold   { background:#fefce8; }
.act-ico.c-green  { background:#f0fdf4; }
.act-ico.c-red    { background:#fff1f2; }
.act-ico.c-purple { background:#f5f3ff; }
.act-info { flex:1; min-width:0; }
.act-title { font-size:.85rem; font-weight:700; color:var(--t1); }
.act-sub { font-size:.72rem; color:var(--t3); }
.act-right { text-align:right; flex-shrink:0; }
.act-val { font-size:.82rem; font-weight:700; color:var(--t1); }
.act-time { font-size:.65rem; color:var(--t4); }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  background:#fff; border-top:1px solid var(--line);
  padding:8px 4px calc(8px + var(--safe-bot));
  display:flex; z-index:100;
  box-shadow:0 -4px 20px rgba(0,0,0,.08);
}
.bn-item {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:5px 2px; border-radius:10px; cursor:pointer;
  transition:all .18s; border:none; background:none;
}
.bn-item:active { transform:scale(.9); }
.bn-item.active { background:#eff6ff; }
.bn-ico { font-size:1.25rem; line-height:1; }
.bn-lbl { font-size:.57rem; font-weight:700; color:var(--t4); }
.bn-item.active .bn-lbl { color:var(--teal); }

/* ── FORMS ── */
.fg { display:flex; flex-direction:column; gap:5px; margin-bottom:12px; }
.fg label { font-size:.63rem; font-weight:800; color:var(--t3); text-transform:uppercase; letter-spacing:.08em; }
.fi {
  background:var(--card2); border:1.5px solid var(--line2); border-radius:var(--r2);
  padding:0 14px; color:var(--t1); font-size:.9rem; font-family:var(--sans);
  outline:none; width:100%; height:46px; transition:all .2s;
}
.fi:focus { border-color:var(--teal); background:#fff; }
select.fi { cursor:pointer; }
textarea.fi { padding:12px 14px; height:auto; resize:vertical; }
.f2 { display:grid; grid-template-columns:1fr 1fr; gap:11px; }
.f3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:11px; }
@media(max-width:600px) { .f2, .f3 { grid-template-columns:1fr; } }

/* ── BUTTONS ── */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  height:44px; padding:0 18px; border:none; border-radius:var(--r2);
  cursor:pointer; font-family:var(--sans); font-size:.85rem; font-weight:700;
  transition:all .18s; text-decoration:none; white-space:nowrap;
}
.btn:active { transform:scale(.96); }
.btn-navy   { background:var(--navy); color:#fff; }
.btn-gold   { background:var(--gold); color:#000; }
.btn-teal   { background:var(--teal); color:#fff; }
.btn-green  { background:var(--green); color:#fff; }
.btn-red    { background:var(--red); color:#fff; }
.btn-ghost  { background:transparent; border:1.5px solid var(--line2); color:var(--t2); }
.btn-light  { background:var(--card2); border:1px solid var(--line); color:var(--t2); }
.btn-sm { height:36px; padding:0 13px; font-size:.78rem; }
.btn-xs { height:30px; padding:0 10px; font-size:.72rem; }
.btn-full { width:100%; }

/* ── BADGES ── */
.badge {
  display:inline-flex; align-items:center; padding:3px 10px;
  border-radius:20px; font-size:.63rem; font-weight:700;
}
.bg-navy   { background:rgba(15,21,53,.1); color:var(--navy); }
.bg-gold   { background:var(--goldl); color:#92650a; }
.bg-teal   { background:var(--teall); color:#0369a1; }
.bg-green  { background:var(--greenl); color:#15803d; }
.bg-red    { background:var(--redl); color:#be123c; }
.bg-orange { background:var(--orangel); color:#c2410c; }
.bg-gray   { background:#f3f4f6; color:var(--t3); }

/* ── TABLE ── */
.tbl-wrap { overflow-x:auto; border-radius:var(--r2); border:1px solid var(--line); }
.tbl { width:100%; border-collapse:collapse; font-size:.83rem; }
.tbl th {
  background:var(--card2); color:var(--t3); font-size:.62rem; font-weight:800;
  text-transform:uppercase; letter-spacing:.07em; padding:10px 12px;
  border-bottom:1px solid var(--line); white-space:nowrap; text-align:left;
}
.tbl td { padding:11px 12px; border-bottom:1px solid var(--line); color:var(--t2); vertical-align:middle; }
.tbl tr:last-child td { border-bottom:none; }
.tbl tr:hover td { background:#fafbff; }

/* ── MODAL ── */
.modal-ov {
  position:fixed; inset:0; background:rgba(15,21,53,.6);
  z-index:500; display:none; align-items:flex-end; justify-content:center;
  backdrop-filter:blur(6px); padding:0;
}
.modal-ov.open { display:flex; }
@media(min-width:600px) { .modal-ov { align-items:center; padding:16px; } }
.modal {
  background:#fff; border-radius:22px 22px 0 0;
  padding:20px; width:100%; max-height:92vh; overflow-y:auto;
}
@media(min-width:600px) { .modal { border-radius:22px; max-width:520px; } }
.modal-handle { width:40px; height:4px; background:var(--line2); border-radius:2px; margin:0 auto 16px; }
.modal-title { font-family:var(--serif); font-size:1.1rem; font-weight:700; color:var(--t1); margin-bottom:16px; }
.btn-row { display:flex; gap:9px; margin-top:4px; }

/* ── PAGE SYSTEM ── */
.page { display:none; }
.page.active { display:block; padding:16px; }

/* ── PAGE HEADER ── */
.page-hd { margin-bottom:16px; }
.page-hd-title { font-family:var(--serif); font-size:1.2rem; font-weight:900; color:var(--t1); }
.page-hd-sub { font-size:.8rem; color:var(--t3); margin-top:2px; }
.page-hd-row { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap; }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:calc(80px + var(--safe-bot)); left:50%;
  transform:translateX(-50%) translateY(60px);
  background:#1e293b; color:#fff; border-radius:var(--r2);
  padding:10px 20px; font-size:.84rem; z-index:9999;
  transition:transform .28s; pointer-events:none;
  display:flex; align-items:center; gap:8px; white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.2);
}
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.ok   { background:#14532d; border-left:3px solid var(--green); }
.toast.err  { background:#4c0519; border-left:3px solid var(--red); }
.toast.info { background:#0c1a2e; border-left:3px solid var(--teal); }

/* ── STATUS BADGES ── */
.status-draft        { background:#f3f4f6; color:var(--t3); }
.status-submitted    { background:#eff6ff; color:#1d4ed8; }
.status-hod_reviewed { background:#fefce8; color:#92400e; }
.status-vp_approved  { background:#f0fdf4; color:#15803d; }
.status-returned     { background:#fff1f2; color:#be123c; }

/* ── UTILS ── */
.flex-center { display:flex; align-items:center; justify-content:center; }
.flex-between { display:flex; align-items:center; justify-content:space-between; }
.flex-gap { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.text-muted { color:var(--t3); font-size:.8rem; }
.empty-state { text-align:center; padding:40px 20px; color:var(--t4); font-size:.85rem; }
.divider { border:none; border-top:1px solid var(--line); margin:12px 0; }
.mt8 { margin-top:8px; }
.mt12 { margin-top:12px; }

/* ── ANIMATIONS ── */
@keyframes fade-up { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:none;} }
.fade-up { animation:fade-up .28s ease both; }

/* ── STATUS PILL ── */
.pill {
  display:inline-flex; align-items:center; padding:3px 10px;
  border-radius:20px; font-size:.63rem; font-weight:700;
}


:root{--bg:#0d1117;--bg2:#111827;--card:#1a2236;--card2:#1e2a45;--line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.12);--t1:#f0f6ff;--t2:#c9d6f0;--t3:#8899bb;--t4:#566280;}
body{background:var(--bg);}
.card{background:var(--card);border-color:var(--line);}
.fi{background:var(--card2);border-color:var(--line2);color:var(--t1);}
.btn-ghost{background:rgba(255,255,255,.06);border-color:var(--line2);color:var(--t2);}
.empty-state{color:var(--t4);}
/* Subject cards */
.subj-card{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:10px;cursor:pointer;transition:all .2s;}
.subj-card:active{transform:scale(.98);}
.subj-ico{font-size:2rem;flex-shrink:0;}
.subj-info{flex:1;}
.subj-name{font-weight:700;color:var(--t1);font-size:.95rem;}
.subj-meta{font-size:.75rem;color:var(--t3);margin-top:2px;}
/* Exam screen */
.exam-header{background:var(--card);border-bottom:1px solid var(--line);padding:12px 16px;position:sticky;top:0;z-index:10;}
.progress-bar{height:4px;background:var(--line);border-radius:2px;margin:8px 0;}
.progress-fill{height:4px;background:var(--gold);border-radius:2px;transition:width .3s;}

// ── DATA ────────────────────────────────────────────────
var RSMS = {
  school:   function(){ return JSON.parse(localStorage.getItem('rsms_school')||'{"name":"","term":"First Term","session":"2025/2026","plan":"Standard"}'); },
  user:     function(){ return JSON.parse(sessionStorage.getItem('rsms_user')||'{"name":"Admin","role":"admin"}'); },

  fees:     function(){ return JSON.parse(localStorage.getItem('rsms_fees')||'[]'); },
  pw:       function(role){ return localStorage.getItem('rsms_'+role+'_pw')||({admin:'admin123',bursar:'bursar123',teacher:'teacher123',classteacher:'ct123',hod:'hod123',vp:'vp123',student:'student123',parent:'parent123'}[role]||'pass123'); },
  save:     function(key,data){ localStorage.setItem('rsms_'+key,JSON.stringify(data)); },
  logout:   function(){ sessionStorage.clear(); location.href='rsms-login.html'; }

// ── SUBJECTS ───────────────────────────────────────────
var SUBJECTS_JSS = ["English Language","Mathematics","Basic Science & Technology","Social Studies","Civic Education","Cultural & Creative Arts","Physical & Health Education","Computer Studies","Agricultural Science","Home Economics","Business Studies","Yoruba Language","Christian Religious Studies","Islamic Religious Studies","Security Education","Basic Technology","French Language"];
var SUBJECTS_SS_SCI = ["English Language","Mathematics","Physics","Chemistry","Biology","Further Mathematics","Computer Studies","Agricultural Science","Christian Religious Studies","Islamic Religious Studies","Civic Education","Physical & Health Education","Yoruba Language","Geography","Technical Drawing"];
var SUBJECTS_SS_COM = ["English Language","Mathematics","Economics","Commerce","Financial Accounting","Business Studies","Office Practice","Computer Studies","Christian Religious Studies","Islamic Religious Studies","Civic Education","Physical & Health Education","Yoruba Language","Literature in English","Marketing"];
var SUBJECTS_SS_ART = ["English Language","Mathematics","Literature in English","Government","History","Christian Religious Studies","Islamic Religious Studies","Yoruba Language","French Language","Fine Arts","Music","Geography","Economics","Civic Education","Physical & Health Education"];

function getSubjects(cls){
  var c=(cls||'').toLowerCase();
  if(c.includes('science'))    return SUBJECTS_SS_SCI;
  if(c.includes('commercial')) return SUBJECTS_SS_COM;
  if(c.includes('art'))        return SUBJECTS_SS_ART;
  if(c.includes('ss')||c.includes('senior')) return SUBJECTS_SS_SCI;
  return SUBJECTS_JSS;
}

function populateSelect(selId,cls,selected){
  var sel=document.getElementById(selId); if(!sel)return;
  var subjects=getSubjects(cls);
  sel.innerHTML='<option value="">-- Select Subject --</option>'+subjects.map(function(s){
    return '<option value="'+s+'"'+(s===selected?' selected':'')+'>'+s+'</option>';
  }).join('');
}

// ── UTILS ──────────────────────────────────────────────
function uniqueArr(arr){
  var seen={},out=[];
  for(var i=0;i<arr.length;i++){if(arr[i]!==undefined&&arr[i]!==null&&arr[i]!==''&&!seen[arr[i]]){seen[arr[i]]=1;out.push(arr[i]);}}
  return out;
}

// ── TOAST ──────────────────────────────────────────────
function toast(msg,type){
  var t=document.getElementById('rsms-toast');
  if(!t){t=document.createElement('div');t.id='rsms-toast';t.className='toast';document.body.appendChild(t);}
  t.className='toast show '+(type==='success'?'ok':type==='error'?'err':'info');
  t.textContent=msg;
  clearTimeout(t._t);
  t._t=setTimeout(function(){t.classList.remove('show');},3200);
}

  var el=document.getElementById(id);
  if(el)el.classList.add('open');
}
function closeModal(id){

// ── PAGE NAVIGATION ────────────────────────────────────
function showPage(name,el){
  // Hide all pages
  var pages=document.querySelectorAll('.page');
  for(var i=0;i<pages.length;i++){
    pages[i].classList.remove('active');
  }
  // Show target page
  var pg=document.getElementById('pg-'+name);
  if(pg){
    pg.classList.add('active');
  }
  // Update sidebar active
  var items=document.querySelectorAll('.sb-item');
  for(var j=0;j<items.length;j++){items[j].classList.remove('active');}
  if(el&&el.classList)el.classList.add('active');
  // Update bottom nav active
  var bnItems=document.querySelectorAll('.bn-item');
  for(var k=0;k<bnItems.length;k++){bnItems[k].classList.remove('active');}
  closeSb();
  // Fire page hook
  var hook=window['onPage_'+name];
  if(typeof hook==='function')hook();
}

// ── CAROUSEL ──────────────────────────────────────────
function initCarousel(slides,trackId,dotsId){
  var track=document.getElementById(trackId);
  var dotsEl=document.getElementById(dotsId);
  if(!track||!slides||!slides.length)return;
  var idx=0;
  track.innerHTML=slides.map(function(s){
    return '<div class="banner" style="min-width:280px;height:110px;flex-shrink:0;scroll-snap-align:start;" onclick="'+s.onclick+'">'+
      '<div class="banner-bg" style="background:'+s.bg+';"></div>'+
      '<div class="banner-content">'+
        '<div><div class="banner-tag">'+s.tag+'</div><div class="banner-title">'+s.title+'</div>'+
        '<div class="banner-sub">'+s.sub+'</div></div>'+
        '<div class="flex-between">'+
          '<button class="banner-btn" onclick="event.stopPropagation();'+s.onclick+'">'+s.btn+' &#8594;</button>'+
          '<span style="font-size:1.8rem;opacity:.5;">'+s.ico+'</span>'+
        '</div>'+
      '</div></div>';
  }).join('');
  if(dotsEl){
    dotsEl.innerHTML=slides.map(function(s,i){
      return '<div class="dot'+(i===0?' active':'')+'"></div>';
    }).join('');
  }
  function goTo(n){
    idx=((n%slides.length)+slides.length)%slides.length;
    var card=track.querySelector('.banner');
    if(card)track.scrollTo({left:idx*(card.offsetWidth+10),behavior:'smooth'});
    if(dotsEl){
      var dots=dotsEl.querySelectorAll('.dot');
      for(var i=0;i<dots.length;i++)dots[i].className='dot'+(i===idx?' active':'');
    }
  }
  var timer=setInterval(function(){goTo(idx+1);},4500);
  track.addEventListener('scroll',function(){
    var card=track.querySelector('.banner');
    if(!card)return;
    var n=Math.round(track.scrollLeft/(card.offsetWidth+10));
    if(n!==idx){idx=n;clearInterval(timer);timer=setInterval(function(){goTo(idx+1);},4500);}
  });
}

// ── WORKFLOW ENGINE ────────────────────────────────────
var WF={
  getAll:function(t){return JSON.parse(localStorage.getItem('rsms_wf_'+t)||'[]');},
  saveAll:function(t,d){localStorage.setItem('rsms_wf_'+t,JSON.stringify(d));},
  badge:function(status){
    var map={draft:'bg-gray',submitted:'bg-teal',hod_reviewed:'bg-gold',vp_approved:'bg-green',returned:'bg-red'};
    var lbl={draft:'Draft',submitted:'Submitted',hod_reviewed:'HOD OK',vp_approved:'VP Approved ✅',returned:'Returned ↩'};
    return '<span class="badge '+(map[status]||'bg-gray')+'" style="font-size:.6rem;">'+(lbl[status]||status)+'</span>';
  },
  submit:function(type,doc){
    var all=WF.getAll(type);
    doc.id=doc.id||('wf'+Date.now());doc.status='submitted';
    doc.submittedAt=new Date().toISOString();
    doc.history=doc.history||[];
    doc.history.push({action:'submitted',by:doc.by,at:new Date().toISOString()});
    var i=all.findIndex(function(d){return d.id===doc.id;});
    if(i>-1)all[i]=doc;else all.push(doc);
    WF.saveAll(type,all);return doc;
  },
  review:function(type,id,action,note,by){
    var all=WF.getAll(type);
    var i=all.findIndex(function(d){return d.id===id;});if(i<0)return false;
    all[i].status=action==='approve'?'hod_reviewed':'returned';
    all[i].hodNote=note;all[i].hodBy=by;all[i].hodAt=new Date().toISOString();
    all[i].history=all[i].history||[];
    all[i].history.push({action:all[i].status,by:by,at:new Date().toISOString(),note:note});
    WF.saveAll(type,all);return all[i];
  },
  vpApprove:function(type,id,action,note,by){
    var all=WF.getAll(type);
    var i=all.findIndex(function(d){return d.id===id;});if(i<0)return false;
    all[i].status=action==='approve'?'vp_approved':'returned';
    all[i].vpNote=note;all[i].vpBy=by;all[i].vpAt=new Date().toISOString();
    all[i].history=all[i].history||[];
    all[i].history.push({action:all[i].status,by:by,at:new Date().toISOString(),note:note});
    WF.saveAll(type,all);return all[i];
  },
  pending:function(role){
    var count=0;
    ['plans','notes','exams'].forEach(function(t){
      var all=WF.getAll(t);
      if(role==='hod')count+=all.filter(function(d){return d.status==='submitted';}).length;
      if(role==='vp') count+=all.filter(function(d){return d.status==='hod_reviewed';}).length;
    });
    return count;
  }
};

// ── LESSON AI ──────────────────────────────────────────
var LESSON_AI={
  URL:'https://rehoteq.com/lesson-ai.html',
  UNITS_PER_TERM:10,
  giftLink:function(teacher){
    var token=btoa((teacher.id||teacher.name)+'|'+(teacher.email||'')+'|'+Date.now()).replace(/[^a-zA-Z0-9]/g,'').slice(0,20);
    var email=encodeURIComponent(teacher.email||(teacher.name.replace(/\s+/g,''))+'@rsms.school');
    return LESSON_AI.URL+'?rsms_gift='+token+'&units='+LESSON_AI.UNITS_PER_TERM+'&teacher='+email;
  },
  giftAll:function(){
    var school=RSMS.school();
    var term=school.term||'First Term';
    var session=school.session||'2025/2026';
    var key='gift_'+term.replace(/\s+/g,'_')+'_'+session.replace('/','_');
    var done=localStorage.getItem(key)==='done';
    var staff=JSON.parse(localStorage.getItem('rsms_staff')||'[]');
    var teachers=staff.filter(function(s){
      var r=(s.role||'').toLowerCase();
      return r.includes('teacher')||r.includes('hod')||r.includes('principal');
    });
    if(!done)localStorage.setItem(key,'done');
    return {alreadyDone:done,teachers:teachers,count:teachers.length};
  }
};

// ── LINK GENERATOR ─────────────────────────────────────
var LINKS={
  BASE:'https://rsms.rehoteq.com/',
  PORTAL:{
    'Class Teacher':'rsms-classteacher.html','Subject Teacher':'rsms-teacher.html',
    'Teacher':'rsms-teacher.html','HOD':'rsms-hod.html',
    'Vice Principal Academic':'rsms-vp.html','Vice Principal Admin':'rsms-vp.html',
    'Principal':'rsms-vp.html','Head Mistress':'rsms-vp.html',
    'Bursar':'rsms-bursar.html','Admin Staff':'rsms-admin.html','Security':'rsms-clock.html'
  },
  _token:function(seed){return btoa(seed+'|'+Date.now()).replace(/[^a-zA-Z0-9]/g,'').slice(0,16);},
  _save:function(tk,data){

  },
  staff:function(s){
    var tk=LINKS._token(s.id||s.name);

    return LINKS.BASE+(LINKS.PORTAL[s.role]||'rsms-teacher.html')+'?token='+tk;

  student:function(s){
    var tk=LINKS._token(s.id||s.reg);

    return LINKS.BASE+'rsms-student.html?token='+tk;

// ── AUTH HELPERS ───────────────────────────────────────
function checkToken(){
  var params=new URLSearchParams(window.location.search);
  var token=params.get('token');
  if(token){
    var tokens=JSON.parse(localStorage.getItem('rsms_tokens')||'{}');
    var td=tokens[token];
    if(td){
      sessionStorage.setItem('rsms_user',JSON.stringify(td));
      sessionStorage.setItem('rsms_auth','true');
      window.history.replaceState({},'',window.location.pathname);
    }
  }
}

// ── COPY ───────────────────────────────────────────────
function copyText(text){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){toast('Copied!','success');});
  } else {
    var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.focus();ta.select();
    try{document.execCommand('copy');toast('Copied!','success');}catch(e){toast('Copy failed','error');}
    document.body.removeChild(ta);
  }
}

function confirmAction(msg,fn){if(window.confirm(msg))fn();}

/* RSMS CBT — Student Exam Engine */
var CBT = {
  questions:[], current:0, answers:{}, timer:null,
  timeLeft:0, subject:'', started:false, submitted:false,
  score:0, total:0
};

var ME = {}, MY_CLASS='', MY_NAME='', MY_ID='';

window.addEventListener('load',function(){
  if(typeof checkToken==='function') checkToken();
  if(typeof setHeaderInfo==='function') setHeaderInfo();
  var user=(typeof RSMS!=='undefined'&&RSMS.user)?RSMS.user():
           JSON.parse(sessionStorage.getItem('rsms_user')||'{}');
  ME=user||{}; MY_CLASS=ME.class||ME.myClass||'';
  MY_NAME=(ME.name||(ME.surname||'')+' '+(ME.firstname||'')).trim();
  MY_ID=ME.id||ME.stuId||ME.reg||'';
  // Update name display
  var nameEl=document.getElementById('cbt-student-name');
  var clsEl=document.getElementById('cbt-student-class');
  if(nameEl) nameEl.textContent=MY_NAME||'Student';
  if(clsEl)  clsEl.textContent=MY_CLASS||'Student';
  loadSubjectMenu();
  // Handle preselect from student portal pill
  var preselect=localStorage.getItem('rsms_cbt_preselect');
  if(preselect){
    localStorage.removeItem('rsms_cbt_preselect');
    setTimeout(function(){ startExam(preselect); },700);
  }
});

function loadSubjectMenu(){
  var subjects=[];
  // Check dedicated keys rsms_cbt_q_SUBJECT
  for(var i=0;i<localStorage.length;i++){
    var k=localStorage.key(i);
    if(k&&k.indexOf('rsms_cbt_q_')===0){
      var subj=k.replace('rsms_cbt_q_','').replace(/_/g,' ');
      if(subjects.indexOf(subj)<0) subjects.push(subj);
    }
  }
  // Check general pool rsms_cbt_questions
  var pool=JSON.parse(localStorage.getItem('rsms_cbt_questions')||'[]');
  pool.forEach(function(q){
    if(q.subject&&subjects.indexOf(q.subject)<0) subjects.push(q.subject);
  });
  // Check exams rsms_cbt_exams
  var exams=JSON.parse(localStorage.getItem('rsms_cbt_exams')||'[]');
  exams.forEach(function(e){
    if(e.subject&&subjects.indexOf(e.subject)<0) subjects.push(e.subject);
  });
  var el=document.getElementById('subject-list');
  if(!el)return;
  if(!subjects.length){
    el.innerHTML='<div style="text-align:center;padding:40px 20px;">'+
      '<div style="font-size:2.5rem;margin-bottom:12px;">&#128218;</div>'+
      '<div style="font-family:var(--serif,serif);font-size:1.1rem;font-weight:900;color:var(--t1,#f0f6ff);margin-bottom:8px;">No Exams Available</div>'+
      '<div style="font-size:.82rem;color:var(--t3,#8899bb);line-height:1.6;max-width:280px;margin:0 auto;">'+
        'Your teacher has not uploaded any CBT questions yet.<br/>Check back after your teacher adds questions.'+
      '</div>'+
      '</div>';
    return;
  }
  el.innerHTML='';
  subjects.forEach(function(subj){
    var pool2=getSubjectQuestions(subj);
    var d=document.createElement('div');d.className='subj-card';
    var qCount=pool2.length;
    var duration=Math.ceil(qCount*1.5);
    var examCount=Math.min(40,qCount);
    d.innerHTML=
      '<div class="subj-ico">&#128218;</div>'+
      '<div class="subj-info">'+
        '<div class="subj-name">'+subj+'</div>'+
        '<div class="subj-meta">'+
          qCount+' questions in bank · '+
          examCount+' per exam · ~'+duration+' mins'+
        '</div>'+
      '</div>'+
      '<button class="btn btn-gold btn-sm">Start &#9654;</button>';
    d.querySelector('button').onclick=(function(s){return function(){startExam(s);};})(subj);
    el.appendChild(d);
  });
}

function getSubjectQuestions(subject){
  // Check dedicated key first
  var key='rsms_cbt_q_'+subject.replace(/\s+/g,'_');
  var dedicated=JSON.parse(localStorage.getItem(key)||'[]');
  // Merge from all sources
  var pool=JSON.parse(localStorage.getItem('rsms_cbt_questions')||'[]')
    .filter(function(q){return q.subject===subject;});
  var exams=JSON.parse(localStorage.getItem('rsms_cbt_exams')||'[]');
  var examQs=[];
  exams.forEach(function(e){
    if(e.subject===subject&&e.questions&&Array.isArray(e.questions)){
      e.questions.forEach(function(q){examQs.push(q);});
    }
  });
  var raw = dedicated.length ? dedicated : pool.concat(examQs);
  // Normalise to {question, options[], answer(index)} format
  return raw.map(function(q){
    // Already normalised
    if(q.options && Array.isArray(q.options)) return q;
    // Convert from {text, optionA/B/C/D, correct:'A'/'B'/'C'/'D'} format
    var opts=[q.optionA||'',q.optionB||'',q.optionC||'',q.optionD||''];
    var correctMap={'A':0,'B':1,'C':2,'D':3,'0':0,'1':1,'2':2,'3':3};
    var answerIdx = correctMap[String(q.correct||'A').toUpperCase()] || 0;
    return {
      question: q.text||q.question||'',
      options:  opts,
      answer:   answerIdx,
      subject:  q.subject||subject,
      class:    q.class||'',
      topic:    q.topic||'',
      explanation: q.explanation||''
    };
  }).filter(function(q){return q.question && q.options.length;});
}

function startExam(subject){
  if(!PLAN_GUARD.canUse('cbt_exam')){ PLAN_GUARD.upgradeModal('cbt_exam'); return; }
  var allQ=getSubjectQuestions(subject);
  if(!allQ.length){toast('No questions available for '+subject,'error');return;}
  // Shuffle and take up to 40 questions
  var shuffled=allQ.slice().sort(function(){return Math.random()-.5;});
  CBT.questions=shuffled.slice(0,Math.min(40,shuffled.length));
  CBT.subject=subject;
  CBT.current=0;CBT.answers={};CBT.submitted=false;CBT.score=0;
  CBT.timeLeft=CBT.questions.length*90; // 90 seconds per question
  document.getElementById('screen-menu').style.display='none';
  document.getElementById('screen-exam').style.display='block';
  renderQuestion();
  startTimer();
  CBT.started=true;
}

function renderQuestion(){
  var q=CBT.questions[CBT.current];
  if(!q)return;
  var total=CBT.questions.length;
  var pct=Math.round((CBT.current/total)*100);
  document.getElementById('q-progress-bar').style.width=pct+'%';
  document.getElementById('q-counter').textContent=(CBT.current+1)+' of '+total;
  document.getElementById('q-subject').textContent=CBT.subject;
  document.getElementById('q-text').textContent=q.question||q.text||q.q||'';
  // Options
  var optEl=document.getElementById('q-options');optEl.innerHTML='';
  var opts=q.options||q.choices||[];
  var saved=CBT.answers[CBT.current];
  opts.forEach(function(opt,i){
    var btn=document.createElement('button');
    btn.className='opt-btn'+(saved===i?' selected':'');
    btn.innerHTML='<span class="opt-letter">'+String.fromCharCode(65+i)+'</span>'+
      '<span class="opt-text">'+opt+'</span>';
    btn.onclick=(function(idx){return function(){selectOption(idx);};})(i);
    optEl.appendChild(btn);
  });
  // Nav buttons
  document.getElementById('btn-prev').disabled=CBT.current===0;
  document.getElementById('btn-next').textContent=
    CBT.current===total-1?'Submit Exam':'Next >';
}

function selectOption(idx){
  CBT.answers[CBT.current]=idx;
  document.querySelectorAll('.opt-btn').forEach(function(b,i){
    b.className='opt-btn'+(i===idx?' selected':'');
  });
}

function navQuestion(dir){
  var total=CBT.questions.length;
  if(dir===1&&CBT.current===total-1){
    // Submit
    var answered=Object.keys(CBT.answers).length;
    var unanswered=total-answered;
    if(unanswered>0){
      if(!confirm('You have '+unanswered+' unanswered question'+(unanswered>1?'s':'')+'. Submit anyway?'))return;
    }
    submitExam();return;
  }
  CBT.current=Math.max(0,Math.min(total-1,CBT.current+dir));
  renderQuestion();
}

function startTimer(){
  clearInterval(CBT.timer);
  CBT.timer=setInterval(function(){
    CBT.timeLeft--;
    var m=Math.floor(CBT.timeLeft/60);
    var s=CBT.timeLeft%60;
    var el=document.getElementById('timer-display');
    if(el){
      el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
      el.style.color=CBT.timeLeft<60?'var(--red)':'var(--t1)';
    }
    if(CBT.timeLeft<=0){clearInterval(CBT.timer);submitExam();}
  },1000);
}

function submitExam(){
  if(CBT.submitted)return;
  clearInterval(CBT.timer);
  CBT.submitted=true;
  // Score
  var correct=0;
  CBT.questions.forEach(function(q,i){
    var ans=CBT.answers[i];
    var correctIdx=q.answer!==undefined?q.answer:(q.correct!==undefined?q.correct:null);
    if(ans!==undefined&&ans===correctIdx) correct++;
  });
  CBT.score=correct;
  CBT.total=CBT.questions.length;
  var pct=Math.round(correct/CBT.total*100);
  // Save result
  var school=JSON.parse(localStorage.getItem('rsms_school')||'{}');
  var result={
    id:'cbt'+Date.now(), stuId:MY_ID, student:MY_NAME, class:MY_CLASS,
    subject:CBT.subject, score:correct, total:CBT.total, percent:pct,
    term:school.term||'First Term', session:school.session||'2025/2026',
    takenAt:new Date().toISOString()
  };
  var results=JSON.parse(localStorage.getItem('rsms_cbt_results')||'[]');
  results.push(result);localStorage.setItem('rsms_cbt_results',JSON.stringify(results));
  // Show result screen
  document.getElementById('screen-exam').style.display='none';
  document.getElementById('screen-result').style.display='block';
  document.getElementById('res-score').textContent=correct+'/'+CBT.total;
  document.getElementById('res-pct').textContent=pct+'%';
  document.getElementById('res-subject').textContent=CBT.subject;
  var grade=pct>=80?'A':pct>=70?'B':pct>=60?'C':pct>=50?'D':'F';
  var gradeColor=pct>=60?'var(--green)':pct>=50?'var(--orange)':'var(--red)';
  document.getElementById('res-grade').textContent=grade;
  document.getElementById('res-grade').style.color=gradeColor;
  document.getElementById('res-remark').textContent=
    pct>=80?'Excellent! Outstanding performance!':
    pct>=70?'Very Good! Keep it up!':
    pct>=60?'Good. Keep studying!':
    pct>=50?'Fair. You need to put in more effort.':
    'Below average. Please revise this topic thoroughly.';
  renderReview();
}

function renderReview(){
  var el=document.getElementById('review-list');if(!el)return;
  el.innerHTML='';
  CBT.questions.forEach(function(q,i){
    var ans=CBT.answers[i];
    var correctIdx=q.answer!==undefined?q.answer:(q.correct!==undefined?q.correct:null);
    var isCorrect=ans!==undefined&&ans===correctIdx;
    var opts=q.options||q.choices||[];
    var d=document.createElement('div');d.className='review-item';
    var explanationHtml = q.explanation ?
      '<div style="font-size:.75rem;color:var(--teal,#0ea5e9);margin-top:5px;padding-top:5px;border-top:1px solid rgba(255,255,255,.06);">'+
        '&#128161; '+q.explanation+'</div>' : '';
    d.innerHTML=
      '<div class="rv-header">'+
        '<span class="rv-num">Q'+(i+1)+'</span>'+
        '<span class="rv-status" style="color:'+(isCorrect?'var(--green)':'var(--red)')+';">'+
          (isCorrect?'&#10003; Correct':'&#10007; Wrong')+'</span>'+
      '</div>'+
      '<div class="rv-q">'+q.question+'</div>'+
      (ans!==undefined?'<div class="rv-ans">Your answer: <strong style="color:'+(isCorrect?'var(--green)':'var(--red)')+';">'+
        (opts[ans]||'?')+'</strong></div>':
        '<div class="rv-ans" style="color:var(--t4);">Not answered</div>')+
      (correctIdx!==null&&!isCorrect?
        '<div class="rv-correct">Correct: <strong style="color:var(--green);">'+
          (opts[correctIdx]||'?')+'</strong></div>':'')+
      explanationHtml;
    el.appendChild(d);
  });
}

function retakeExam(){
  document.getElementById('screen-result').style.display='none';
  document.getElementById('screen-menu').style.display='block';
  loadSubjectMenu();
}

// Populate student name in menu after load
window.addEventListener('load', function(){
  var user = typeof RSMS!=='undefined'&&RSMS.user?RSMS.user():{};
  var name = (user.name||(user.surname||'')+' '+(user.firstname||'')).trim()||'Student';
  var cls  = user.class||user.myClass||'';
  var el=document.getElementById('cbt-student-name');
  var cl=document.getElementById('cbt-student-class');
  if(el) el.textContent = name;
  if(cl) cl.textContent = cls||'Student';
});

// Safe PLAN_GUARD fallback if not loaded
if(typeof PLAN_GUARD==='undefined'){
  window.PLAN_GUARD={
    canUse:function(){ return true; },
    upgradeModal:function(f){ alert(f+' requires a higher plan. Contact Rehoteq.'); },
    checkLimit:function(){ return {ok:true}; },
    getPlan:function(){ return 'enterprise'; }
  };
}
