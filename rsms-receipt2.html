<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RSMS — Fee Receipt Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="rsms-school-detect.js"></script>
<style>
:root{
  --bg:#030305;--panel:#080b14;--card:#0d1020;--card2:#121828;
  --gold:#d4a843;--goldl:rgba(212,168,67,.1);
  --teal:#14b8a6;--teall:rgba(20,184,166,.1);
  --success:#22c55e;--successl:rgba(34,197,94,.1);
  --danger:#f43f5e;--dangerl:rgba(244,63,94,.1);
  --t1:#f0f2ff;--t2:rgba(240,242,255,.65);--t3:rgba(240,242,255,.35);--t4:rgba(240,242,255,.13);
  --line:rgba(255,255,255,.06);--line2:rgba(255,255,255,.12);
  --r:14px;--r2:10px;--sans:'Outfit',sans-serif;--serif:'Fraunces',serif;--mono:'DM Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{font-family:var(--sans);background:var(--bg);color:var(--t1);min-height:100vh;}
body{background:radial-gradient(ellipse 60% 40% at 80% 10%,rgba(212,168,67,.07),transparent),#030305;}

/* TOPBAR */
.topbar{background:rgba(8,11,20,.96);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);padding:12px 18px;
  display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
.tb-title{font-family:var(--serif);font-size:1rem;font-weight:700;flex:1;}
.btn{display:inline-flex;align-items:center;gap:6px;height:40px;padding:0 16px;
  border:none;border-radius:var(--r2);cursor:pointer;font-family:var(--sans);
  font-size:.84rem;font-weight:700;transition:all .2s;}
.btn:active{transform:scale(.97);}
.btn-gold{background:linear-gradient(135deg,#4a2500,var(--gold));color:#000;}
.btn-ok{background:linear-gradient(135deg,#052e16,var(--success));color:#fff;}
.btn-ghost{background:rgba(255,255,255,.06);border:1px solid var(--line2);color:var(--t2);}
.btn-sm{height:36px;padding:0 13px;font-size:.8rem;}
.btn-teal{background:linear-gradient(135deg,#042f2e,var(--teal));color:#fff;}

/* LAYOUT */
.layout{display:grid;grid-template-columns:340px 1fr;gap:0;min-height:calc(100vh - 65px);}
@media(max-width:768px){.layout{grid-template-columns:1fr;}}

/* FORM PANEL */
.form-panel{background:var(--panel);border-right:1px solid var(--line);
  padding:20px 18px;overflow-y:auto;}
.fp-title{font-family:var(--serif);font-size:1rem;font-weight:700;
  color:var(--t1);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.fg label{font-size:.63rem;font-weight:800;color:var(--t3);
  text-transform:uppercase;letter-spacing:.09em;}
.fi{background:var(--card2);border:1px solid var(--line2);border-radius:var(--r2);
  padding:0 14px;color:var(--t1);font-size:.9rem;font-family:var(--sans);
  outline:none;width:100%;height:46px;transition:all .2s;}
.fi:focus{border-color:rgba(212,168,67,.4);}
select.fi{cursor:pointer;}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.card-small{background:var(--card);border:1px solid var(--line);
  border-radius:var(--r2);padding:14px;margin-bottom:12px;}
.cs-title{font-size:.72rem;font-weight:800;color:var(--t3);
  text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px;}

/* FEE ITEMS */
.fee-item{display:flex;align-items:center;gap:9px;margin-bottom:8px;}
.fee-name{flex:1;font-size:.85rem;color:var(--t2);}
.fee-amt{width:100px;height:38px;background:var(--card2);border:1px solid var(--line2);
  border-radius:var(--r2);padding:0 10px;color:var(--t1);font-size:.85rem;
  font-family:var(--mono);outline:none;text-align:right;transition:all .2s;}
.fee-amt:focus{border-color:rgba(212,168,67,.4);}
.fee-del{background:none;border:none;color:var(--danger);cursor:pointer;
  font-size:1rem;padding:4px;line-height:1;}
.add-fee-row{display:flex;gap:8px;margin-top:4px;}
.add-fee-input{flex:1;height:38px;background:var(--card2);border:1px solid var(--line2);
  border-radius:var(--r2);padding:0 12px;color:var(--t1);font-size:.85rem;
  outline:none;transition:all .2s;}
.add-fee-input:focus{border-color:rgba(212,168,67,.4);}

/* PREVIEW PANEL */
.preview-panel{padding:20px;background:#f5f2ec;overflow-y:auto;}
@media(max-width:768px){.preview-panel{min-height:600px;}}

/* RECEIPT — A4 white style */
.receipt{
  width:100%;max-width:680px;margin:0 auto;
  background:#fff;color:#000;
  font-family:Arial,Helvetica,sans-serif;
  border:1px solid #ccc;
  min-height:297mm;
  box-shadow:0 8px 40px rgba(0,0,0,.15);}

/* RECEIPT HEADER */
.rc-head{
  display:grid;grid-template-columns:80px 1fr 80px;
  align-items:center;gap:10px;
  padding:16px 20px 12px;
  border-bottom:3px solid #1a0a3e;}
.rc-logo{width:72px;height:72px;border:1px solid #ddd;overflow:hidden;
  display:flex;align-items:center;justify-content:center;font-size:.6rem;color:#999;}
.rc-logo img{width:100%;height:100%;object-fit:contain;}
.rc-school-name{font-size:17px;font-weight:900;color:#1a0a3e;
  text-align:center;text-transform:uppercase;margin-bottom:3px;}
.rc-school-addr{font-size:9px;color:#555;text-align:center;margin-bottom:3px;}
.rc-school-contact{font-size:8.5px;color:#555;text-align:center;}
.rc-receipt-badge{
  background:#1a0a3e;color:#fff;
  padding:4px 8px;border-radius:4px;
  font-size:9px;font-weight:700;text-align:center;
  text-transform:uppercase;letter-spacing:.06em;}

/* OFFICIAL RECEIPT BAND */
.rc-official{
  background:#d4a843;color:#000;
  text-align:center;padding:6px;
  font-size:11px;font-weight:900;
  text-transform:uppercase;letter-spacing:.25em;}

/* RECEIPT INFO */
.rc-info{
  display:grid;grid-template-columns:1fr 1fr;
  border-bottom:1px solid #ddd;padding:12px 20px;gap:8px;}
.rc-info-row{display:flex;gap:6px;font-size:9.5px;margin-bottom:5px;align-items:baseline;}
.rc-info-label{font-weight:700;color:#1a0a3e;min-width:100px;flex-shrink:0;}
.rc-info-val{color:#000;font-weight:600;border-bottom:1px dotted #ccc;
  flex:1;padding-bottom:1px;}

/* RECEIPT NUMBER STRIP */
.rc-num-strip{
  display:flex;justify-content:space-between;align-items:center;
  background:#f8f5ee;border-top:1px solid #ddd;border-bottom:1px solid #ddd;
  padding:8px 20px;font-size:9px;}
.rc-rcpt-no{font-family:'Courier New',monospace;font-size:12px;font-weight:900;
  color:#1a0a3e;letter-spacing:.08em;}

/* FEE TABLE */
.rc-fee-table{width:100%;border-collapse:collapse;margin:0;}
.rc-fee-table th{
  background:#1a0a3e;color:#fff;
  padding:8px 14px;font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;text-align:left;}
.rc-fee-table th:last-child,.rc-fee-table td:last-child{text-align:right;}
.rc-fee-table td{
  padding:9px 14px;font-size:10px;color:#000;
  border-bottom:1px solid #eee;}
.rc-fee-table tr:last-child td{border-bottom:none;}
.rc-fee-table tr:nth-child(even) td{background:#f9f9f9;}
.rc-fee-sn{color:#999;font-size:9px;}

/* TOTAL */
.rc-total-row{
  background:#1a0a3e;color:#fff;
  display:flex;justify-content:space-between;
  padding:10px 20px;font-size:12px;font-weight:900;}
.rc-total-right{font-family:'Courier New',monospace;font-size:14px;}

/* BALANCE */
.rc-balance{padding:8px 20px;display:flex;justify-content:space-between;
  background:#f0ece0;font-size:9.5px;border-bottom:1px solid #ddd;}
.rc-outstanding{color:#dc2626;font-weight:700;}
.rc-paid-full{color:#16a34a;font-weight:700;}

/* PAYMENT METHOD */
.rc-payment{padding:10px 20px;border-bottom:1px solid #ddd;font-size:9.5px;}
.rc-pay-row{display:flex;gap:6px;margin-bottom:4px;}
.rc-pay-label{font-weight:700;color:#1a0a3e;min-width:110px;}
.rc-pay-val{color:#000;}

/* REMARKS */
.rc-remarks{padding:10px 20px;border-bottom:1px solid #ddd;}
.rc-rem-title{font-size:9px;font-weight:700;color:#1a0a3e;
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.rc-rem-box{border:1px solid #ddd;border-radius:4px;padding:7px 10px;
  min-height:36px;font-size:9px;color:#333;}

/* SIGNATURES */
.rc-sigs{display:grid;grid-template-columns:1fr 1fr;
  border-bottom:1px solid #ddd;padding:10px 20px;}
.rc-sig{text-align:center;padding:4px;}
.rc-sig-line{border-bottom:1px solid #000;height:26px;margin-bottom:4px;}
.rc-sig-name{font-size:9px;font-weight:700;color:#1a0a3e;}
.rc-sig-title{font-size:8px;color:#555;text-transform:uppercase;}

/* WATERMARK */
.rc-watermark{
  text-align:center;font-size:8px;color:#999;padding:6px 20px;
  border-bottom:2px solid #1a0a3e;}

/* FOOTER */
.rc-footer{
  background:#1a0a3e;color:#fff;
  display:flex;justify-content:space-between;align-items:center;
  padding:7px 20px;font-size:7.5px;}

/* QR / COPY */
.rc-copy{
  text-align:center;padding:8px;
  background:#fff9ee;border-top:2px dashed #ccc;
  font-size:8px;color:#999;}

@media print{
  body{background:#fff;}
  .form-panel,.topbar{display:none!important;}
  .layout{grid-template-columns:1fr;}
  .preview-panel{background:#fff;padding:0;}
  .receipt{border:none;box-shadow:none;max-width:100%;}
  @page{size:A4 portrait;margin:6mm;}
}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);
  border-radius:var(--r2);padding:10px 22px;font-size:.86rem;z-index:999;
  transition:transform .28s;pointer-events:none;display:flex;align-items:center;gap:8px;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.s{background:#0a1f12;border:1px solid rgba(34,197,94,.4);color:#4ade80;}
.toast.e{background:#1f0a12;border:1px solid rgba(244,63,94,.4);color:#fb7185;}
.toast.i{background:#0f1020;border:1px solid rgba(212,168,67,.35);color:var(--gold);}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-title">🧾 Fee Receipt Generator</div>
  <div style="display:flex;gap:8px;">
    <button class="btn btn-teal btn-sm" onclick="saveReceipt()">💾 Save Receipt</button>
    <button class="btn btn-gold btn-sm" onclick="window.print()">🖨 Print Receipt</button>
    <button class="btn btn-ghost btn-sm" onclick="window.location.href='rsms-bursar.html'">← Bursar</button>
  </div>
</div>

<div class="layout">

  <!-- FORM PANEL -->
  <div class="form-panel">
    <div class="fp-title">📝 Receipt Details</div>

    <!-- STUDENT -->
    <div class="card-small">
      <div class="cs-title">Student Information</div>
      <div class="fg"><label>Search Student</label>
        <input class="fi" id="stu-search" placeholder="Type name or reg number..."
          oninput="searchStudents()" autocomplete="off"
          style="height:40px;font-size:.85rem;"/>
        <div id="stu-dropdown" style="display:none;background:var(--card);border:1px solid var(--line2);
          border-radius:var(--r2);margin-top:4px;max-height:160px;overflow-y:auto;"></div>
      </div>
      <div class="f2">
        <div class="fg"><label>Full Name</label>
          <input class="fi" id="rc-name" placeholder="Student full name"/></div>
        <div class="fg"><label>Class</label>
          <input class="fi" id="rc-class" placeholder="e.g. JSS 2"/></div>
      </div>
      <div class="fg"><label>Reg Number</label>
        <input class="fi" id="rc-reg" placeholder="e.g. REG-2024-001"/></div>
    </div>

    <!-- PAYMENT INFO -->
    <div class="card-small">
      <div class="cs-title">Payment Information</div>
      <div class="f2">
        <div class="fg"><label>Term</label>
          <select class="fi" id="rc-term" onchange="updatePreview()">
            <option>First Term</option><option>Second Term</option><option>Third Term</option>
          </select>
        </div>
        <div class="fg"><label>Session</label>
          <input class="fi" id="rc-session" value="2025/2026" onchange="updatePreview()"/></div>
      </div>
      <div class="f2">
        <div class="fg"><label>Date Paid</label>
          <input class="fi" type="date" id="rc-date" onchange="updatePreview()"/></div>
        <div class="fg"><label>Payment Method</label>
          <select class="fi" id="rc-method" onchange="updatePreview()">
            <option>Cash</option>
            <option>Moniepoint Transfer</option>
            <option>Bank Transfer</option>
            <option>POS</option>
            <option>Cheque</option>
            <option>Online Payment</option>
          </select>
        </div>
      </div>
      <div class="fg"><label>Transaction Reference (optional)</label>
        <input class="fi" id="rc-ref" placeholder="e.g. TXN123456789" oninput="updatePreview()"/></div>
    </div>

    <!-- FEE ITEMS -->
    <div class="card-small">
      <div class="cs-title">Fee Breakdown</div>
      <div id="fee-items"></div>
      <div class="add-fee-row">
        <input class="add-fee-input" id="new-fee-name" placeholder="Fee item name..." 
          onkeydown="if(event.key==='Enter')addFeeItem()"/>
        <button class="btn btn-gold btn-sm" onclick="addFeeItem()" style="flex-shrink:0;">+ Add</button>
      </div>
      <!-- Quick fee buttons -->
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;">
        <button class="btn btn-ghost" style="height:30px;font-size:.7rem;padding:0 10px;"
          onclick="quickFee('School Fees')">School Fees</button>
        <button class="btn btn-ghost" style="height:30px;font-size:.7rem;padding:0 10px;"
          onclick="quickFee('Examination Fee')">Exam Fee</button>
        <button class="btn btn-ghost" style="height:30px;font-size:.7rem;padding:0 10px;"
          onclick="quickFee('Sports Levy')">Sports</button>
        <button class="btn btn-ghost" style="height:30px;font-size:.7rem;padding:0 10px;"
          onclick="quickFee('Development Levy')">Development</button>
        <button class="btn btn-ghost" style="height:30px;font-size:.7rem;padding:0 10px;"
          onclick="quickFee('PTA Levy')">PTA</button>
        <button class="btn btn-ghost" style="height:30px;font-size:.7rem;padding:0 10px;"
          onclick="quickFee('Computer Levy')">Computer</button>
        <button class="btn btn-ghost" style="height:30px;font-size:.7rem;padding:0 10px;"
          onclick="quickFee('Library Levy')">Library</button>
        <button class="btn btn-ghost" style="height:30px;font-size:.7rem;padding:0 10px;"
          onclick="quickFee('Bus Fee')">Bus Fee</button>
      </div>
    </div>

    <!-- BALANCE -->
    <div class="card-small">
      <div class="cs-title">Balance & Remarks</div>
      <div class="f2">
        <div class="fg"><label>Expected Total (₦)</label>
          <input class="fi" type="number" id="rc-expected" placeholder="0.00"
            oninput="updatePreview()"/></div>
        <div class="fg"><label>Amount Paid (₦)</label>
          <input class="fi" type="number" id="rc-paid" placeholder="0.00"
            oninput="updatePreview()"/></div>
      </div>
      <div class="fg"><label>Bursar's Remarks</label>
        <input class="fi" id="rc-remarks" placeholder="e.g. Full payment received, Thank you."
          oninput="updatePreview()"/></div>
    </div>

    <button class="btn btn-ok" onclick="saveReceipt()" style="width:100%;height:48px;font-size:.95rem;">
      💾 Save & Generate Receipt
    </button>
  </div>

  <!-- PREVIEW PANEL -->
  <div class="preview-panel">
    <div class="receipt" id="receipt-preview">
      <!-- Generated by updatePreview() -->
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
var DB = {
  school: JSON.parse(localStorage.getItem('rsms_school')||
    '{"name":"School Name","address":"School Address","phone":"","email":"","principal":""}'),
  students: JSON.parse(localStorage.getItem('rsms_students')||'[]'),
  fees: JSON.parse(localStorage.getItem('rsms_fees')||'[]')
};
var schoolLogo = localStorage.getItem('rsms_school_logo')||'';
var feeItems = [];
var receiptNo = 'RCP-' + Date.now().toString().slice(-6);

function toast(msg,type){
  var t=document.getElementById('toast');
  t.className='toast show '+(type||'i');
  t.textContent=msg;clearTimeout(t._t);
  t._t=setTimeout(function(){t.classList.remove('show');},3500);
}

// ── STUDENT SEARCH ──
function searchStudents(){
  var q=document.getElementById('stu-search').value.toLowerCase();
  var dd=document.getElementById('stu-dropdown');
  if(!q){dd.style.display='none';return;}
  var matches=DB.students.filter(function(s){
    var name=((s.surname||'')+(s.firstname||'')).toLowerCase();
    return name.includes(q)||(s.reg||'').toLowerCase().includes(q);
  }).slice(0,8);
  if(!matches.length){dd.style.display='none';return;}
  dd.style.display='block';
  dd.innerHTML=matches.map(function(s){
    var name=(s.surname||'')+' '+(s.firstname||'');
    return '<div onclick="selectStudent(\''+name+'\',\''+s.class+'\',\''+s.reg+'\')" '+
      'style="padding:9px 12px;cursor:pointer;font-size:.82rem;border-bottom:1px solid var(--line);'+
      'transition:background .15s;" '+
      'onmouseover="this.style.background=\'rgba(212,168,67,.08)\'" '+
      'onmouseout="this.style.background=\'\'">'+
      '<strong style="color:var(--t1);">'+name+'</strong> '+
      '<span style="color:var(--t3);font-size:.75rem;">'+s.class+' · '+s.reg+'</span></div>';
  }).join('');
}
function selectStudent(name,cls,reg){
  document.getElementById('rc-name').value=name;
  document.getElementById('rc-class').value=cls;
  document.getElementById('rc-reg').value=reg;
  document.getElementById('stu-search').value=name;
  document.getElementById('stu-dropdown').style.display='none';
  updatePreview();
}

// ── FEE ITEMS ──
function addFeeItem(name){
  var n=name||document.getElementById('new-fee-name').value.trim();
  if(!n)return;
  feeItems.push({name:n,amount:0});
  document.getElementById('new-fee-name').value='';
  renderFeeItems();
  updatePreview();
}
function quickFee(name){ addFeeItem(name); }

function renderFeeItems(){
  var el=document.getElementById('fee-items');
  el.innerHTML=feeItems.map(function(item,i){
    return '<div class="fee-item">'+
      '<div class="fee-name">'+item.name+'</div>'+
      '<input class="fee-amt" type="number" placeholder="0" value="'+(item.amount||'')+'" '+
        'oninput="updateFeeAmt('+i+',this.value)" min="0"/>'+
      '<button class="fee-del" onclick="removeFee('+i+')">✕</button>'+
    '</div>';
  }).join('');
}
function updateFeeAmt(i,val){
  feeItems[i].amount=parseFloat(val)||0;
  updatePreview();
}
function removeFee(i){
  feeItems.splice(i,1);
  renderFeeItems();
  updatePreview();
}

// ── RECEIPT GENERATION ──
function fmtMoney(n){ return '₦' + (parseFloat(n)||0).toLocaleString('en-NG',{minimumFractionDigits:2}); }

function updatePreview(){
  var school = DB.school;
  var name = document.getElementById('rc-name').value||'Student Name';
  var cls = document.getElementById('rc-class').value||'—';
  var reg = document.getElementById('rc-reg').value||'—';
  var term = document.getElementById('rc-term').value;
  var session = document.getElementById('rc-session').value||'2025/2026';
  var datePaid = document.getElementById('rc-date').value||new Date().toISOString().slice(0,10);
  var method = document.getElementById('rc-method').value;
  var ref = document.getElementById('rc-ref').value;
  var expected = parseFloat(document.getElementById('rc-expected').value)||0;
  var remarks = document.getElementById('rc-remarks').value||'Payment received. Thank you.';

  var total = feeItems.reduce(function(s,f){return s+(f.amount||0);},0);
  var paid = parseFloat(document.getElementById('rc-paid').value)||total;
  var balance = expected - paid;

  var logoHtml = schoolLogo
    ? '<img src="'+schoolLogo+'" style="width:100%;height:100%;object-fit:contain;" onerror="this.parentNode.innerHTML=\'LOGO\'"/>'
    : '<div style="font-size:.55rem;color:#999;text-align:center;">School<br/>Logo</div>';

  var feeRows = feeItems.length
    ? feeItems.map(function(f,i){
        return '<tr><td class="rc-fee-sn">'+(i+1)+'</td>'+
          '<td style="font-weight:600;">'+f.name+'</td>'+
          '<td>'+(term)+'</td>'+
          '<td style="font-family:Courier New,monospace;font-weight:700;">'+fmtMoney(f.amount)+'</td></tr>';
      }).join('')
    : '<tr><td colspan="4" style="text-align:center;padding:20px;color:#999;">No fee items added</td></tr>';

  var html =
  '<div class="rc-head">'+
    '<div class="rc-logo">'+logoHtml+'</div>'+
    '<div>'+
      '<div class="rc-school-name">'+school.name+'</div>'+
      '<div class="rc-school-addr">'+(school.address||'School Address')+'</div>'+
      '<div class="rc-school-contact">'+(school.phone||'')+(school.email?' | '+school.email:'')+'</div>'+
    '</div>'+
    '<div class="rc-receipt-badge">Official<br/>Receipt</div>'+
  '</div>'+
  '<div class="rc-official">Official School Fee Receipt</div>'+
  '<div class="rc-num-strip">'+
    '<div>Receipt No: <span class="rc-rcpt-no">'+receiptNo+'</span></div>'+
    '<div>Date: <strong>'+new Date(datePaid).toLocaleDateString('en-NG',{day:'2-digit',month:'long',year:'numeric'})+'</strong></div>'+
    '<div>Term: <strong>'+term+' '+session+'</strong></div>'+
  '</div>'+
  '<div class="rc-info">'+
    '<div>'+
      iRow('Student Name',name)+
      iRow('Class / Form',cls)+
      iRow('Reg. Number',reg)+
    '</div>'+
    '<div>'+
      iRow('Payment Method',method)+
      (ref?iRow('Transaction Ref',ref):'')+
      iRow('Received by',school.bursarName||'School Bursar')+
    '</div>'+
  '</div>'+
  '<table class="rc-fee-table">'+
    '<thead><tr><th style="width:30px;">S/N</th><th>Description</th><th>Term</th><th>Amount</th></tr></thead>'+
    '<tbody>'+feeRows+'</tbody>'+
  '</table>'+
  '<div class="rc-total-row">'+
    '<div>TOTAL AMOUNT PAID</div>'+
    '<div class="rc-total-right">'+fmtMoney(paid)+'</div>'+
  '</div>'+
  '<div class="rc-balance">'+
    '<div>Expected Total: <strong>'+fmtMoney(expected||total)+'</strong></div>'+
    (balance>0
      ? '<div class="rc-outstanding">Outstanding Balance: '+fmtMoney(balance)+'</div>'
      : '<div class="rc-paid-full">✅ Fully Paid</div>')+
  '</div>'+
  '<div class="rc-payment">'+
    '<div class="rc-rem-title">Payment Details</div>'+
    '<div class="rc-pay-row"><span class="rc-pay-label">Bank / Mode:</span>'+
      '<span class="rc-pay-val">Moniepoint — 7036302585 — Rehoteq Technologies and Electrical Concept</span></div>'+
    (ref?'<div class="rc-pay-row"><span class="rc-pay-label">Transaction Ref:</span><span class="rc-pay-val">'+ref+'</span></div>':'')+
  '</div>'+
  '<div class="rc-remarks">'+
    '<div class="rc-rem-title">Bursar\'s Remarks</div>'+
    '<div class="rc-rem-box">'+remarks+'</div>'+
  '</div>'+
  '<div class="rc-sigs">'+
    '<div class="rc-sig"><div class="rc-sig-line"></div>'+
      '<div class="rc-sig-name">'+(school.bursarName||'School Bursar')+'</div>'+
      '<div class="rc-sig-title">Bursar / Fee Collector</div></div>'+
    '<div class="rc-sig"><div class="rc-sig-line"></div>'+
      '<div class="rc-sig-name">Parent / Guardian</div>'+
      '<div class="rc-sig-title">Payer\'s Signature</div></div>'+
  '</div>'+
  '<div class="rc-watermark">'+
    'This is an official receipt of '+school.name+'. Keep this receipt for your records. • RSMS — rsms.rehoteq.com'+
  '</div>'+
  '<div class="rc-footer">'+
    '<span>'+school.name+' | '+term+' '+session+'</span>'+
    '<span>Generated by RSMS — Rehoteq Technologies</span>'+
    '<span>'+receiptNo+'</span>'+
  '</div>'+
  '<div class="rc-copy">'+
    '— — — — PARENT COPY — — — — CUT HERE — — — — SCHOOL COPY — — — —'+
  '</div>';

  document.getElementById('receipt-preview').innerHTML = html;
}

function iRow(label,val){
  return '<div class="rc-info-row">'+
    '<span class="rc-info-label">'+label+':</span>'+
    '<span class="rc-info-val">'+val+'</span></div>';
}

// ── SAVE RECEIPT ──
function saveReceipt(){
  var name=document.getElementById('rc-name').value;
  var reg=document.getElementById('rc-reg').value;
  if(!name){toast('Enter student name','e');return;}
  var total=feeItems.reduce(function(s,f){return s+(f.amount||0);},0);
  var paid=parseFloat(document.getElementById('rc-paid').value)||total;
  var receipt={
    id:receiptNo,
    studentName:name,
    class:document.getElementById('rc-class').value,
    reg:reg,
    term:document.getElementById('rc-term').value,
    session:document.getElementById('rc-session').value,
    items:feeItems.slice(),
    total:total,
    paid:paid,
    method:document.getElementById('rc-method').value,
    ref:document.getElementById('rc-ref').value,
    date:document.getElementById('rc-date').value,
    generatedAt:new Date().toISOString()
  };
  DB.fees.push(receipt);
  localStorage.setItem('rsms_fees',JSON.stringify(DB.fees));
  toast('✅ Receipt saved — '+receiptNo,'s');
  // Generate new receipt number for next one
  setTimeout(function(){
    receiptNo='RCP-'+Date.now().toString().slice(-6);
  },1000);
}

// ── INIT ──
window.addEventListener('load',function(){
  document.getElementById('rc-date').value=new Date().toISOString().slice(0,10);
  // Default fee items
  feeItems=[
    {name:'School Fees',amount:0},
    {name:'Examination Fee',amount:0}
  ];
  renderFeeItems();
  updatePreview();
});
</script>
