<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RSMS — QR Code Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#030305;--panel:#0d0f1a;--card:#111420;--card2:#161929;
  --line:rgba(255,255,255,0.07);--line2:rgba(255,255,255,0.13);
  --gold:#d4a843;--goldl:rgba(212,168,67,0.1);
  --success:#22c55e;--successl:rgba(34,197,94,0.1);
  --teal:#14b8a6;--teall:rgba(20,184,166,0.1);
  --purple:#8b5cf6;--purplel:rgba(139,92,246,0.1);
  --t1:#f0f2ff;--t2:rgba(240,242,255,0.65);--t3:rgba(240,242,255,0.35);--t4:rgba(240,242,255,0.14);
  --r:14px;--r2:10px;--r3:7px;--serif:'Fraunces',serif;--sans:'Outfit',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);min-height:100vh;}
.topbar{background:var(--panel);border-bottom:1px solid var(--line);padding:14px 22px;
  display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
.tb-back{background:none;border:1px solid var(--line2);border-radius:var(--r3);
  color:var(--t3);cursor:pointer;font-size:.88rem;padding:9px 16px;font-family:var(--sans);}
.tb-title{font-family:var(--serif);font-size:1rem;font-weight:700;color:var(--t1);}
.tb-right{margin-left:auto;display:flex;gap:8px;}
.wrap{max-width:1100px;margin:0 auto;padding:24px 18px 60px;}

/* TABS */
.tabs{display:flex;gap:7px;margin-bottom:22px;}
.tab{padding:11px 22px;border-radius:20px;font-size:.9rem;font-weight:700;
  cursor:pointer;border:1px solid var(--line);background:var(--card2);color:var(--t3);
  transition:all .2s;font-family:var(--sans);}
.tab.active{background:var(--goldl);color:var(--gold);border-color:rgba(212,168,67,.3);}

/* CONTROLS */
.controls{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:18px;margin-bottom:20px;}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:.65rem;font-weight:800;color:var(--t3);
  text-transform:uppercase;letter-spacing:.09em;}
.fi{background:var(--card2);border:1px solid var(--line2);border-radius:var(--r2);
  padding:0 13px;color:var(--t1);font-size:.92rem;font-family:var(--sans);
  outline:none;width:100%;height:48px;transition:all .2s;}
.fi:focus{border-color:rgba(212,168,67,.4);}
select.fi{cursor:pointer;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  height:48px;padding:0 22px;border:none;border-radius:var(--r2);cursor:pointer;
  font-family:var(--sans);font-size:.92rem;font-weight:700;transition:all .2s;}
.btn:active{transform:scale(.97);}
.btn-gold{background:linear-gradient(135deg,#4a2500,var(--gold));color:#000;}
.btn-teal{background:linear-gradient(135deg,#0a3d38,var(--teal));color:#fff;}
.btn-ghost{background:rgba(255,255,255,.06);border:1px solid var(--line2);color:var(--t2);}
.btn-ghost:hover{background:rgba(255,255,255,.1);color:var(--t1);}
.btn-purple{background:linear-gradient(135deg,#3b0764,var(--purple));color:#fff;}
.btn-sm{height:40px;padding:0 16px;font-size:.82rem;border-radius:var(--r3);}
.btn-row{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px;}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:.65rem;font-weight:700;}
.b-gold{background:var(--goldl);color:var(--gold);}
.b-teal{background:var(--teall);color:var(--teal);}
.b-purple{background:var(--purplel);color:var(--purple);}

/* QR CARD GRID */
.qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
@media(min-width:900px){.qr-grid{grid-template-columns:repeat(auto-fill,minmax(210px,1fr));}}

/* QR CARD — screen view */
.qr-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:18px;text-align:center;transition:all .2s;}
.qr-card:hover{border-color:var(--line2);transform:translateY(-2px);}
.qr-card-photo{width:56px;height:56px;border-radius:50%;margin:0 auto 10px;
  background:linear-gradient(135deg,var(--teal),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;font-weight:700;color:#fff;overflow:hidden;}
.qr-card-photo img{width:100%;height:100%;object-fit:cover;}
.qr-card-name{font-size:.88rem;font-weight:700;color:var(--t1);margin-bottom:2px;}
.qr-card-meta{font-size:.7rem;color:var(--t4);margin-bottom:10px;}
.qr-code-area{background:var(--card2);border-radius:var(--r3);padding:10px;
  display:flex;align-items:center;justify-content:center;margin-bottom:8px;}
.qr-reg{font-family:monospace;font-size:.7rem;color:var(--gold);}

/* PRINT STYLES */
@page{size:A4 portrait;margin:8mm;}
@media print{
  body{background:#fff;color:#000;}
  .topbar,.controls,.tabs,.no-print,.btn-row{display:none!important;}
  .wrap{padding:10px;max-width:100%;}
  .qr-grid{grid-template-columns:repeat(4,1fr);gap:10px;}
  .qr-card{
    border:1px solid #ccc;border-radius:8px;padding:12px;
    break-inside:avoid;background:#fff;color:#000;}
  .qr-card-name{color:#000;}
  .qr-card-meta{color:#555;}
  .qr-reg{color:#8b4500;}
  .qr-code-area{background:#f5f5f5;border:1px solid #ddd;}
  .qr-school-watermark{display:block!important;}
}
.qr-school-watermark{display:none;font-size:.6rem;color:#aaa;margin-top:4px;}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(60px);
  border-radius:var(--r2);padding:11px 20px;font-size:.88rem;z-index:999;
  transition:transform .25s;pointer-events:none;display:flex;align-items:center;gap:8px;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{background:#0a1f12;border:1px solid rgba(34,197,94,.4);color:#4ade80;}
.toast.error{background:#1f0a12;border:1px solid rgba(244,63,94,.4);color:#fb7185;}
.toast.info{background:#0f1020;border:1px solid rgba(212,168,67,.35);color:var(--gold);}
</style>
</head>
<body>
<div class="topbar">
  <button class="tb-back" onclick="history.back()">← Back</button>
  <div class="tb-title">📱 QR Code Generator</div>
  <div class="tb-right no-print">
    <button class="btn btn-ghost btn-sm" onclick="window.print()">🖨 Print All</button>
    <button class="btn btn-gold btn-sm" onclick="generateAll()">Generate All QR Codes</button>
  </div>
</div>

<div class="wrap">
  <div class="tabs no-print">
    <div class="tab active" id="tab-students" onclick="setTab('students',this)">👨‍🎓 Student QR Codes</div>
    <div class="tab" id="tab-staff" onclick="setTab('staff',this)">👨‍🏫 Staff QR Codes</div>
  </div>

  <!-- CONTROLS -->
  <div class="controls no-print">
    <div class="f3" style="margin-bottom:12px;">
      <div class="fg"><label>Filter by Class / Department</label>
        <select class="fi" id="filter-group" onchange="generateAll()">
          <option value="">All</option>
        </select>
      </div>
      <div class="fg"><label>Card Size</label>
        <select class="fi" id="card-size" onchange="applyCardSize()">
          <option value="200">Small (4 per row)</option>
          <option value="240" selected>Medium (3 per row)</option>
          <option value="300">Large (2 per row)</option>
        </select>
      </div>
      <div class="fg"><label>Include Photo</label>
        <select class="fi" id="include-photo">
          <option value="yes">Yes — Show Passport Photo</option>
          <option value="no">No — Initials Only</option>
        </select>
      </div>
    </div>
    <div class="btn-row" style="margin-top:0;">
      <button class="btn btn-gold btn-sm" onclick="generateAll()">🔄 Generate / Refresh</button>
      <button class="btn btn-ghost btn-sm" onclick="window.print()">🖨 Print All QR Cards</button>
      <button class="btn btn-teal btn-sm" onclick="downloadAll()">📥 Download as Images</button>
      <span id="gen-count" style="margin-left:auto;font-size:.82rem;color:var(--t3);align-self:center;"></span>
    </div>
  </div>

  <!-- QR GRID -->
  <div class="qr-grid" id="qr-grid">
    <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--t4);">
      <div style="font-size:3rem;margin-bottom:12px;">📱</div>
      <div style="font-size:.9rem;">Click "Generate All QR Codes" to start</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
var DB = {
  school: JSON.parse(localStorage.getItem('rsms_school')||'{"name":"School"}'),
  students: JSON.parse(localStorage.getItem('rsms_students')||'[]'),
  staff: JSON.parse(localStorage.getItem('rsms_staff')||'[]')
};
var currentTab = 'students';

function toast(msg,type){var t=document.getElementById('toast');t.className='toast '+(type||'info')+' show';t.innerHTML=msg;clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},3500);}

function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  populateFilter();
  generateAll();
}

function populateFilter() {
  var sel = document.getElementById('filter-group');
  sel.innerHTML = '<option value="">All</option>';
  if(currentTab === 'students') {
    var classes = [...new Set(DB.students.map(function(s){return s.class||'';}).filter(Boolean))].sort();
    classes.forEach(function(c){
      var o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);
    });
  } else {
    var depts = [...new Set(DB.staff.map(function(s){return s.dept||s.role||'';}).filter(Boolean))].sort();
    depts.forEach(function(d){
      var o=document.createElement('option');o.value=d;o.textContent=d;sel.appendChild(o);
    });
  }
}

function generateAll() {
  var filter = document.getElementById('filter-group').value;
  var includePhoto = document.getElementById('include-photo').value === 'yes';
  var items = currentTab === 'students' ? DB.students : DB.staff;

  if(filter) {
    if(currentTab === 'students') {
      items = items.filter(function(s){return s.class===filter;});
    } else {
      items = items.filter(function(s){return s.dept===filter||s.role===filter;});
    }
  }

  if(!items.length) {
    document.getElementById('qr-grid').innerHTML =
      '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--t4);">No '+currentTab+' found. Add them in the Admin portal first.</div>';
    return;
  }

  document.getElementById('gen-count').textContent = items.length + ' ' + currentTab + ' QR codes';
  document.getElementById('qr-grid').innerHTML = '';

  items.forEach(function(item, idx) {
    setTimeout(function(){ renderQRCard(item, idx, includePhoto); }, idx * 30);
  });

  toast('📱 Generating '+items.length+' QR codes...','info');
}

function renderQRCard(item, idx, includePhoto) {
  var isStudent = currentTab === 'students';
  var name = isStudent ?
    ((item.surname||'')+' '+(item.firstname||'')) :
    (item.name||'Staff');
  var id = isStudent ? (item.reg||item.id) : (item.staffId||item.id);
  var sub = isStudent ? (item.class||'—') : ((item.role||'—')+(item.dept?' · '+item.dept:''));
  var photo = item.passport || item.photo || '';
  var school = DB.school.name || 'RSMS';

  // QR data payload
  var qrData = JSON.stringify({
    type: isStudent ? 'student' : 'staff',
    id: id,
    name: name,
    class: item.class || item.dept || '',
    school: school
  });

  // Build card
  var card = document.createElement('div');
  card.className = 'qr-card';
  card.id = 'qrcard-'+idx;

  // Avatar
  var avatarHtml = '';
  if(includePhoto && photo) {
    avatarHtml = '<div class="qr-card-photo"><img src="'+photo+'" onerror="this.parentNode.innerHTML=\''+name.charAt(0)+'\'"/></div>';
  } else {
    avatarHtml = '<div class="qr-card-photo">'+name.charAt(0)+'</div>';
  }

  card.innerHTML =
    avatarHtml +
    '<div class="qr-card-name">'+name+'</div>'+
    '<div class="qr-card-meta">'+sub+'</div>'+
    '<div class="qr-code-area" id="qr-'+idx+'"></div>'+
    '<div class="qr-reg">'+id+'</div>'+
    '<div class="qr-school-watermark">'+school+'</div>';

  document.getElementById('qr-grid').appendChild(card);

  // Generate QR
  try {
    new QRCode(document.getElementById('qr-'+idx), {
      text: qrData,
      width: 130, height: 130,
      colorDark: isStudent ? '#14b8a6' : '#d4a843',
      colorLight: '#161929',
      correctLevel: QRCode.CorrectLevel.M
    });
  } catch(e) {
    document.getElementById('qr-'+idx).innerHTML =
      '<div style="font-size:.7rem;color:var(--t4);padding:10px;">QR: '+id+'</div>';
  }
}

function applyCardSize() {
  var size = document.getElementById('card-size').value;
  document.getElementById('qr-grid').style.gridTemplateColumns =
    'repeat(auto-fill,minmax('+size+'px,1fr))';
}

function downloadAll() {
  toast('📥 To save individually — right-click any QR code image and Save As. For bulk, use Print → Save as PDF','info');
}

// Init
window.addEventListener('load', function() {
  populateFilter();
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function(){});
});
</script>
</body>
</html>
